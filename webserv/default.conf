server
{
    listen 0.0.0.0:8088;
    server_name localhost;

    root ./www;

    error_page 403 /error_page/403.html;
    error_page 404 /error_page/404.html;
    error_page 405 /error_page/405.html;
    error_page 413 /error_page/413.html;
    client_max_body_size 7547387968;

    location /  {
        index index.html;
        root ./www;
        allow_methods GET;
        autoindex off;
    }

    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
    }

    location /error_page
    {
        root ./www/error_page;
        autoindex off;
    }

    location /directory/ {
        root ./YoupiBanane;
        allow_methods GET POST;
        index youpi.bad_extension;
        autoindex off;
    }

    location .py {
        allow_methods GET POST;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
    }

    location .bla {
        allow_methods POST;
        cgi_path ./cgi_tester;
        cgi_ext .bla;
    }

    location /uploads
    {
        root ./www/uploads;
        allow_methods POST DELETE;
        upload_path ./www/uploads;
        autoindex off;
    }

    location /cgi-bin {
        root ./www/cgi-bin;
        allow_methods GET POST;
        index test.py;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
        autoindex off;
    }
    
    location /test {
        root ./www/test;
        allow_methods GET POST DELETE;
        autoindex on;
    }

    location /new-page
    {
        index newpage.html;
        root ./www/new-page;
        allow_methods GET POST DELETE;
    }

    location /old-page {
        return 301 /new-page;
    }
}

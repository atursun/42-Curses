<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            color: #166534;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 2px solid #22c55e;
            padding: 40px;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #374151;
        }
        .highlight {
            font-weight: bold;
            color: #dc2626;
        }
        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Successful Redirect!</h1>
        <p>Congratulations, you have been redirected from <span class="highlight">/old-page</span>.</p>
        <p>This is the <strong>/new-page</strong> (newpage.html).</p>
        <br>
        <a href="/">Return to Home</a>

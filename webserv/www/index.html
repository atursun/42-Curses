<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .methods {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .method {
            flex: 1 1 30%;
            min-width: 250px;
            border: 1px solid #000;
            padding: 15px;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 5px;
            margin: 8px 0;
            border: 1px solid #000;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 8px;
            border: 1px solid #000;
            background: white;
            cursor: pointer;
        }

        button:hover {
            background: #f0f0f0;
        }

        .response {
            border: 1px solid #000;
            padding: 15px;
            margin-top: 20px;
        }

        #response {
            border: 1px solid #000;
            padding: 10px;
            min-height: 100px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Webserver</h1>

    <div class="methods">
        <div class="method">
            <h3>GET</h3>
            <input type="text" id="getUrl" value="/">
            <button onclick="sendGet()">Send</button>
        </div>

        <div class="method">
            <h3>POST</h3>
            <input type="text" id="postUrl" value="/uploads">
            <input type="file" id="postFile">
            <button onclick="sendPost()">Send</button>
        </div>

        <div class="method">
            <h3>DELETE</h3>
            <input type="text" id="deleteUrl" value="/">
            <button onclick="sendDelete()">Send</button>
        </div>

        <div class="method">
            <h3>CGI GET</h3>
            <input type="text" id="cgiGetUrl" value="/cgi-bin">
            <input type="text" id="cgiGetQuery" value="var=value&number=30" placeholder="Query: var=value">
            <button onclick="sendCgiGet()">Send</button>
        </div>

        <div class="method">
            <h3>CGI POST</h3>
            <input type="text" id="cgiPostUrl" value="/cgi-bin">
            <input type="text" id="cgiPostData" value="hello=world" placeholder="Body: veri=test">
            <button onclick="sendCgiPost()">Send</button>
        </div>
    </div>

    <div class="response">
        <h3>Response</h3>
        <div id="response">...</div>
    </div>

    <script>
        function show(method, url, status, data) {
            const responseDiv = document.getElementById('response');
            
            if (status == 403)
                window.location.href = '/error_page/403.html';     
            else if (status == 404)
                window.location.href = '/error_page/404.html';
            else if (status == 405)
                window.location.href = '/error_page/405.html';
            else {
                responseDiv.innerHTML = `
                    <div style="margin-bottom: 10px; padding: 10px; background: #f5f5f5; border-left: 3px solid ${status >= 200 && status < 300 ? '#4CAF50' : '#f44336'}">
                        <strong>${method}</strong> ${url} → Status: <strong>${status}</strong>
                    </div>
                    <div style="margin-top: 10px;">
                        ${data}
                    </div>
                `;
            }
        }

        async function sendGet() {
            const url = document.getElementById('getUrl').value;
            
            if (url === '/') {
                show('GET', url, 200, '<div style="text-align:center;padding:30px;"><h2 style="color:#4CAF50;">✓ Server is Running</h2><p>GET request to root path successful</p><p style="color:#666;font-size:12px;"></p></div>');
                return;
            }
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                show('GET', url, res.status, text);
            } catch (e) {
                show('GET', url, 'Error', e.message);
            }
        }

        async function sendPost() {
            const url = document.getElementById('postUrl').value;
            const file = document.getElementById('postFile').files[0];
            
            if (!file) {
                alert('Dosya seçin');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch(url, {method: 'POST', body: formData});
                const text = await res.text();
                show('POST', url, res.status, text);
            } catch (e) {
                show('POST', url, 'Error', e.message);
            }
        }

        async function sendDelete() {
            const url = document.getElementById('deleteUrl').value;
            try {
                const res = await fetch(url, {method: 'DELETE'});
                const text = await res.text();
                show('DELETE', url, res.status, text);
            } catch (e) {
                show('DELETE', url, 'Error', e.message);
            }
        }

        async function sendCgiGet() {
            const url = document.getElementById('cgiGetUrl').value;
            const query = document.getElementById('cgiGetQuery').value;
            const fullUrl = query ? `${url}?${query}` : url;
            
            try {
                const res = await fetch(fullUrl);
                const text = await res.text();
                show('CGI GET', fullUrl, res.status, text);
            } catch (e) {
                show('CGI GET', fullUrl, 'Error', e.message);
            }
        }

        async function sendCgiPost() {
            const url = document.getElementById('cgiPostUrl').value;
            const data = document.getElementById('cgiPostData').value;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: data
                });
                const text = await res.text();
                show('CGI POST', url, res.status, text);
            } catch (e) {
                show('CGI POST', url, 'Error', e.message);
            }
        }
    </script>
</body>
</html>

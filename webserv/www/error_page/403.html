<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Forbidden</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
            background: #f8f9fa;
            margin: 0;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #ff0000;
        }

        h2 {
            font-size: 28px;
            color: #333;
            margin: 20px 0;
        }

        p {
            font-size: 16px;
            color: #666;
            margin: 30px 0;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <h1>403</h1>
    <h2>Access Forbidden</h2>
    <p>You don't have permission to access this resource.</p>
    <a href="/">Back to Home</a>
</body>
</html>

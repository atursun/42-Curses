<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>413 - Payload Too Large</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
            background: #f8f9fa;
            margin: 0;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #e67e22;
        }

        h2 {
            font-size: 28px;
            color: #333;
            margin: 20px 0;
        }

        p {
            font-size: 16px;
            color: #666;
            margin: 30px 0;
            line-height: 1.6;
        }

        .info {
            padding: 20px;
            border-radius: 8px;
            margin: 30px auto;
            max-width: 600px;
	        }

        a {
            display: inline-block;
            padding: 12px 30px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        a:hover {
            background: #2980b9;
        }

        .icon {
            font-size: 80px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="icon">⚠️</div>
    <h1>413</h1>
    <h2>Payload Too Large</h2>
    <div class="info">
        <p><strong>The request body is too large.</strong></p>
        <p>The file or data you're trying to upload exceeds the maximum allowed size set by the server.</p>
        <p>Please try uploading a smaller file or contact the server administrator.</p>
    </div>
    <a href="/">Back to Home</a>
</body>
</html>

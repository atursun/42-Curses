services:
  mariadb:
    build: ./requirements/mariadb   # Dizindeki dockerfile'dan image build ediyorsun (build: docker build komutunun yerini alıyor)
    image: mariadb
    container_name: mariadb
    restart: always
    networks:                     # networks: kısmı docker network create inception_network komutunun yerini alıyor.
      - inception
    expose:                       # Sadece internal erişim. dışarıdan erişmezsin.
      - "3306"
    volumes:                      # volumes: kısmı "docker volume create" komutlarının yerini alıyor.
      - mariadb:/var/lib/mysql
    env_file:
      - .env
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    networks:
      - inception
    expose:
      - "9000"
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb       # DB önce başlayacak demek. 
    env_file:
      - .env
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: always
    networks:
      - inception
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - wordpress:/var/www/html   # wordpress servisinin Aynı volume, Nginx WordPress dosyalarını okuyabilir

networks:
  inception:
    driver: bridge

volumes:
  wordpress:
  mariadb:


# expose → sadece container içi
# ports → dış dünyaya açık
# driver: bridge, 
# Docker’da kullanılan network türünü belirtir ve en temel anlamıyla container’ların aynı özel ağ içinde birbirleriyle iletişim kurmasını sağlayan sanal ağ yapısıdır.
# bridge driver = container’lar için oluşturulan izole “yerel ağ (LAN)”

# Nasıl çalışır?
# -Docker içinde:
# # Docker bir sanal switch (köprü) oluşturur
# # Container’lar bu switch’e bağlanır
# # Aynı network içindeki container’lar birbirini görür